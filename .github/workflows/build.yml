# Build & push images to Artifact Registry on tag push.
#
# Triggers on any v* tag (e.g. v0.2.0, v0.2.0-rc1). Pushes both backend and
# frontend images tagged with the git tag AND the commit sha (for traceability
# and rollback).
#
# Does NOT touch the cluster. Promotion to staging/prod is done by
# promote-staging.yml / promote-prod.yml which commit image tag bumps to
# overlays/*/kustomization.yaml; ArgoCD then syncs.
name: Build images

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  id-token: write   # for WIF

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  AR_HOST: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  AR_REPO: lims
  IMAGE_TAG: ${{ github.ref_name }}
  SHA_TAG: sha-${{ github.sha }}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SA_EMAIL }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure docker for Artifact Registry
        run: gcloud auth configure-docker ${{ env.AR_HOST }} --quiet

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & push backend
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ env.IMAGE_TAG }}
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ env.SHA_TAG }}
          cache-from: type=gha,scope=backend
          cache-to: type=gha,scope=backend,mode=max

      - name: Build & push frontend
        uses: docker/build-push-action@v6
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          build-args: |
            NEXT_PUBLIC_API_URL=/api
          tags: |
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ env.IMAGE_TAG }}
            ${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ env.SHA_TAG }}
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,scope=frontend,mode=max

      - name: Summary
        run: |
          echo "### Built images" >> $GITHUB_STEP_SUMMARY
          echo "- backend:${IMAGE_TAG} (+ ${SHA_TAG})" >> $GITHUB_STEP_SUMMARY
          echo "- frontend:${IMAGE_TAG} (+ ${SHA_TAG})" >> $GITHUB_STEP_SUMMARY

  # Create a GitHub Release for stable tags only (skip -rc). rc tags still
  # build images and promote to staging — they just don't show up on the
  # Releases page, which is reserved for production-shipped versions.
  release:
    needs: build
    if: ${{ !contains(github.ref_name, '-rc') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Images
            ```
            docker pull asia-east1-docker.pkg.dev/lims-497613/lims/backend:${{ github.ref_name }}
            docker pull asia-east1-docker.pkg.dev/lims-497613/lims/frontend:${{ github.ref_name }}
            ```
