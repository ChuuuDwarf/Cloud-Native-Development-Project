# Promote a release-candidate tag to staging.
#
# Triggers on v*-rc* tags (e.g. v0.2.0-rc1). Waits for build.yml to finish,
# then commits an image tag bump to overlays/staging/kustomization.yaml on
# main. ArgoCD's lims-staging Application picks up the commit and syncs.
#
# No cluster access, no SSH — this only writes to git.
name: Promote to staging

on:
  push:
    tags:
      - "v*-rc*"

permissions:
  contents: write   # commit the kustomization.yaml bump back to main

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  AR_HOST: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  AR_REPO: lims
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  # Wait for build.yml on the same tag to publish images before bumping.
  wait-for-build:
    runs-on: ubuntu-latest
    steps:
      - name: Wait for build workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.ref }}
          check-name: build
          repo-token: ${{ secrets.PROMOTION_TOKEN }}
          wait-interval: 15

  promote:
    needs: wait-for-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PROMOTION_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tgz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/kustomize

      - name: Bump image tag in overlays/staging
        working-directory: deploy/k3s/overlays/staging
        run: |
          kustomize edit set image \
            lims-backend=${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ env.IMAGE_TAG }} \
            lims-frontend=${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ env.IMAGE_TAG }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k3s/overlays/staging/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No change — staging already on ${IMAGE_TAG}."
            exit 0
          fi
          git commit -m "chore(staging): promote ${IMAGE_TAG}"
          git push origin main

      - name: Summary
        run: |
          echo "### Promoted to staging" >> $GITHUB_STEP_SUMMARY
          echo "Image tag: \`${IMAGE_TAG}\` — ArgoCD will sync within ~3 min." >> $GITHUB_STEP_SUMMARY
