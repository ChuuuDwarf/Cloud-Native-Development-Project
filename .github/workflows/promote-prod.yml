# Promote a release tag to production.
#
# Triggers on plain v* tags that are NOT -rc (e.g. v0.2.0, v1.3.4). The job
# uses the `production` GitHub Environment, which is configured with required
# reviewers + "prevent self-review" — so a teammate must approve before the
# image tag bump is committed to overlays/prod/kustomization.yaml.
#
# ArgoCD's lims-prod Application then syncs the new tag onto the cluster.
name: Promote to production

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GCP_PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  GCP_REGION: ${{ secrets.GCP_REGION }}
  AR_HOST: ${{ secrets.GCP_REGION }}-docker.pkg.dev
  AR_REPO: lims
  IMAGE_TAG: ${{ github.ref_name }}

jobs:
  # Skip rc tags — those go through promote-staging.yml only.
  filter:
    runs-on: ubuntu-latest
    outputs:
      is_release: ${{ steps.check.outputs.is_release }}
    steps:
      - id: check
        run: |
          if [[ "${IMAGE_TAG}" == *-rc* ]]; then
            echo "is_release=false" >> $GITHUB_OUTPUT
            echo "Tag ${IMAGE_TAG} is an rc — skipping prod promotion."
          else
            echo "is_release=true" >> $GITHUB_OUTPUT
          fi

  wait-for-build:
    needs: filter
    if: needs.filter.outputs.is_release == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Wait for build workflow
        uses: lewagon/wait-on-check-action@v1.3.4
        with:
          ref: ${{ github.ref }}
          check-name: build
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          wait-interval: 15

  promote:
    needs: wait-for-build
    runs-on: ubuntu-latest
    environment: production    # <- reviewer gate kicks in here
    steps:
      - name: Checkout main
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.PROMOTION_TOKEN }}

      - name: Install kustomize
        run: |
          curl -sLo /tmp/kustomize.tgz "https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize%2Fv5.4.3/kustomize_v5.4.3_linux_amd64.tar.gz"
          tar xzf /tmp/kustomize.tgz -C /tmp
          sudo mv /tmp/kustomize /usr/local/bin/kustomize

      - name: Bump image tag in overlays/prod
        working-directory: deploy/k3s/overlays/prod
        run: |
          kustomize edit set image \
            lims-backend=${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/backend:${{ env.IMAGE_TAG }} \
            lims-frontend=${{ env.AR_HOST }}/${{ env.GCP_PROJECT_ID }}/${{ env.AR_REPO }}/frontend:${{ env.IMAGE_TAG }}

      - name: Commit & push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add deploy/k3s/overlays/prod/kustomization.yaml
          if git diff --cached --quiet; then
            echo "No change — prod already on ${IMAGE_TAG}."
            exit 0
          fi
          git commit -m "chore(prod): promote ${IMAGE_TAG}"
          git push origin main

      - name: Summary
        run: |
          echo "### Promoted to production" >> $GITHUB_STEP_SUMMARY
          echo "Image tag: \`${IMAGE_TAG}\` — ArgoCD will sync within ~3 min." >> $GITHUB_STEP_SUMMARY
