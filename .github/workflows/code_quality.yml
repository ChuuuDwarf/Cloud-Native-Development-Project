name: Code Quality

on:
  pull_request:
    branches:
      - '**'
  push:
    branches:
      - '**'

permissions:
  contents: read

jobs:
  frontend-quality:
    name: Frontend Code Quality - Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check format
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run typecheck

  backend-quality:
    name: Backend Code Quality - Node.js ${{ matrix.node-version }}
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        node-version: [20]

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Check format
        run: npm run format:check

      - name: Run lint
        run: npm run lint

      - name: Run type check
        run: npm run typecheck