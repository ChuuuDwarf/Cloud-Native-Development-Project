# Let's Encrypt ClusterIssuers (cluster-scoped, shared by both environments).
# Apply AFTER cert-manager itself is installed (Phase 3).
#
# Two issuers:
#  - letsencrypt-staging: LE's staging CA. Untrusted certs (browser warning) but
#    NO rate limits — use it to debug the HTTP-01 flow without burning quota.
#  - letsencrypt-prod: real, trusted certs. Has rate limits (~5 certs/host/week),
#    so only switch the Ingress to this once staging issuance succeeds.
#
# HTTP-01 solver routes the ACME challenge through Traefik (k3s default ingress).
# Requires port 80 reachable from the internet (firewall opens 80/443 in Phase 3).
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-staging
spec:
  acme:
    server: https://acme-staging-v02.api.letsencrypt.org/directory
    email: yyy6415@gmail.com
    privateKeySecretRef:
      name: letsencrypt-staging-account
    solvers:
      - http01:
          ingress:
            class: traefik
---
apiVersion: cert-manager.io/v1
kind: ClusterIssuer
metadata:
  name: letsencrypt-prod
spec:
  acme:
    server: https://acme-v02.api.letsencrypt.org/directory
    email: yyy6415@gmail.com
    privateKeySecretRef:
      name: letsencrypt-prod-account
    solvers:
      - http01:
          ingress:
            class: traefik
