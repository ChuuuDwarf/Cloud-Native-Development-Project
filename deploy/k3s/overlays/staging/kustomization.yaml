apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Staging environment. Namespace created out-of-band:
#   kubectl create namespace lims-staging
namespace: lims-staging

resources:
- ../../base

# Override CORS_ORIGINS for staging's nip.io subdomain. Same-origin browser
# requests don't trip CORS; this is for non-browser API clients calling
# the staging URL directly.
configMapGenerator:
- name: lims-config
  behavior: merge
  literals:
  - CORS_ORIGINS=https://staging.34.80.119.4.nip.io
  # Enable the TAS MQTT listener in staging. The actual TAS_SN_KEY
  # (customer key for `phone-conn/calloutResult/<key>`) is treated as a
  # secret and lives in `lims-secrets` — set it via the lims-set-secrets
  # interactive script. envFrom precedence: secret beats this configmap,
  # so we don't need a placeholder here.
  - TAS_ENABLED=true

# Staging deploys on the same VM/IP as prod, distinguished by the nip.io
# subdomain `staging.<IP>.nip.io`. CD points these at the -rc image tags.
images:
- name: lims-backend
  newName: asia-east1-docker.pkg.dev/lims-497613/lims/backend
  newTag: v0.3.1-rc1
- name: lims-frontend
  newName: asia-east1-docker.pkg.dev/lims-497613/lims/frontend
  newTag: v0.3.1-rc1

# Fewer replicas in staging to leave room on the single VM.
  # Host-based TLS for staging. REPLACE_IP filled with the VM static IP in
  # Phase 3 -> host staging.<IP>.nip.io, its own cert in lims-tls.
patches:
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: backend
- patch: |-
    - op: replace
      path: /spec/replicas
      value: 1
  target:
    kind: Deployment
    name: frontend
- patch: |-
    - op: add
      path: /metadata/annotations
      value:
        cert-manager.io/cluster-issuer: letsencrypt-prod
        traefik.ingress.kubernetes.io/router.middlewares: lims-staging-redirect-https@kubernetescrd
    - op: add
      path: /spec/tls
      value:
        - hosts:
            - staging.34.80.119.4.nip.io
          secretName: lims-tls
    - op: add
      path: /spec/rules/0/host
      value: staging.34.80.119.4.nip.io
  target:
    kind: Ingress
    name: lims
