apiVersion: v1
kind: Service
metadata:
  name: backend
spec:
  selector:
    app: backend
  ports:
    - port: 8000
      targetPort: 8000
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      # Make the uploads volume writable by the image's non-root `app` user
      # (uid/gid 1000 from the Dockerfile's `useradd app`).
      securityContext:
        fsGroup: 1000
      containers:
        - name: backend
          image: lims-backend
          command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000"]
          ports:
            - containerPort: 8000
          envFrom:
            - configMapRef:
                name: lims-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: 150m
              memory: 256Mi
            limits:
              memory: 768Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads
