apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  annotations:
    configmap.reloader.stakater.com/reload: "lims-config"
    secret.reloader.stakater.com/reload: "lims-secrets"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: celery-worker
          image: lims-backend
          command:
            ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: lims-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          readinessProbe:
            exec:
              command:
                [
                  "sh",
                  "-c",
                  "celery -A app.core.celery_app inspect ping -d celery@$HOSTNAME",
                ]
            initialDelaySeconds: 20
            periodSeconds: 30
            timeoutSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads
