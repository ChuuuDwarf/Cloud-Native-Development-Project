apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-worker
  annotations:
    configmap.reloader.stakater.com/reload: "lims-config"
    secret.reloader.stakater.com/reload: "lims-secrets"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-worker
  template:
    metadata:
      labels:
        app: celery-worker
    spec:
      securityContext:
        fsGroup: 1000
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: celery-worker
          image: lims-backend
          command:
            ["celery", "-A", "app.core.celery_app", "worker", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: lims-config
            - secretRef:
                name: lims-secrets
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: DATABASE_URL
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
          # `celery inspect ping` 走 Redis 廣播 + 等 pong，在 worker 忙著跑
          # tick_progress (每 2s) 或被 Cloud SQL 慢查詢卡住時，10s 內可能回不來。
          # 過去這個 probe 偶爾誤判 Unhealthy 觸發 rolling update 反彈。
          # 放寬參數 + 加大 failureThreshold，連續 3 次失敗才算真的壞。
          readinessProbe:
            exec:
              command:
                [
                  "sh",
                  "-c",
                  "celery -A app.core.celery_app inspect ping -d celery@$HOSTNAME",
                ]
            initialDelaySeconds: 30
            periodSeconds: 60
            timeoutSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              memory: 512Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: uploads
