apiVersion: batch/v1
kind: Job
metadata:
  name: db-seed
  annotations:
    argocd.argoproj.io/sync-wave: "2"
    argocd.argoproj.io/hook: PostSync
spec:
  backoffLimit: 2
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: seed
          image: lims-backend
          command: ["python", "scripts/seed_dev.py"]
          envFrom:
            - configMapRef:
                name: lims-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: DATABASE_URL
