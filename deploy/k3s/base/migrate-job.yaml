apiVersion: batch/v1
kind: Job
metadata:
  name: db-migrate
  annotations:
    argocd.argoproj.io/sync-wave: "1"
    argocd.argoproj.io/hook: PostSync
spec:
  backoffLimit: 3
  # Clean up finished migration jobs after 10 min to avoid clutter.
  ttlSecondsAfterFinished: 600
  template:
    spec:
      restartPolicy: Never
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: migrate
          image: lims-backend
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - configMapRef:
                name: lims-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: DATABASE_URL
