apiVersion: v1
kind: ConfigMap
metadata:
  name: lims-config
data:
  # mode since both are HTTPS.
  ENV: "production"
  REDIS_URL: "redis://redis:6379/0"
  JWT_ALGORITHM: "HS256"
  # Pydantic BaseSettings reads env keys uppercased + underscored — backend
  # expects JWT_ACCESS_EXPIRES_MINUTES and JWT_REFRESH_EXPIRES_DAYS (see
  # backend/app/core/config.py). The previous JWT_EXPIRES_MINUTES key was
  # silently ignored and tokens fell back to the default 60-min access.
  JWT_ACCESS_EXPIRES_MINUTES: "1440"
  JWT_REFRESH_EXPIRES_DAYS: "7"
  # Same-origin: browser hits /api on the same host, so CORS isn't exercised.
  # Kept for safety / non-browser clients; overlay can point it at the real URL.
  CORS_ORIGINS: "http://localhost"
  
  EMAIL_BACKEND: "file"
  EMAIL_FROM: "noreply@lims.local"
  UPLOADS_DIR: "/app/uploads"
 
  CHT_BASE_URL: "https://tasapi.cht.com.tw/apis/CHTIoT"
  # DB connection (non-secret parts). Password is injected from the Secret via
  # the Deployment env; the full DATABASE_URL is assembled there.
  POSTGRES_HOST: "postgres"
  POSTGRES_PORT: "5432"
  POSTGRES_DB: "lims"
  POSTGRES_USER: "lims"
  # TAS (中華電信 phone alert) — defaults keep the listener in fail-safe no-op
  # mode. Overlays flip TAS_ENABLED=true and supply TAS_SN_KEY (customer key
  # for the MQTT topic `phone-conn/calloutResult/${TAS_SN_KEY}`).
  # CHT_API_KEY / CHT_SERVICE_NUMBER live in `lims-secrets`, not here.
  TAS_ENABLED: "false"
  TAS_SN_KEY: ""
  TAS_MQTT_BROKER_URL: "tls://tasapi.cht.com.tw:2883"
