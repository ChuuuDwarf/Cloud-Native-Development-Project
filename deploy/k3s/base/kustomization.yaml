apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: lims

resources:
  - config.yaml
  - uploads-pvc.yaml
  - postgres.yaml
  - redis.yaml
  - backend.yaml
  - celery-worker.yaml
  - celery-beat.yaml
  - frontend.yaml
  - migrate-job.yaml
  - seed-job.yaml
  - seed-demo-job.yaml
  - ingress.yaml
  - redirect-https.yaml
  # NOTE: secret.example.yaml is intentionally NOT included — the real
  # lims-secrets Secret is created out-of-band so secrets never live in git.

images:
  - name: lims-backend
    newName: lims-backend
  - name: lims-frontend
    newName: lims-frontend

labels:
  - pairs:
      app.kubernetes.io/part-of: lims
    includeSelectors: false
