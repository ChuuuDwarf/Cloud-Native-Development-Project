apiVersion: v1
kind: Secret
metadata:
  name: lims-secrets
  namespace: lims
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME_32_BYTE_HEX"
  POSTGRES_PASSWORD: "REPLACE_ME"
  # Must embed the same password as POSTGRES_PASSWORD above.
  DATABASE_URL: "postgresql+asyncpg://lims:REPLACE_ME@postgres:5432/lims"

  # ---------------------------------------------------------------------------
  # Optional secrets — backend silently no-ops when blank (default Field=""),
  # so leaving them empty is safe in environments that don't need them. Keys
  # MUST match the backend's pydantic field names (see backend/app/core/
  # config.py): pydantic BaseSettings reads ENV vars uppercased + underscored.
  # ---------------------------------------------------------------------------

  # 中華電信 TAS 電話告警 (Sprint 3d) — blank = phone_sender logs "not
  # configured" and skips. Set both to enable phone fan-out on issue escalation.
  CHT_API_KEY: ""
  CHT_SERVICE_NUMBER: ""

  # SMTP for issue / pickup-reminder emails — blank + EMAIL_BACKEND=file means
  # the email_sender writes to a file inside the container (lost on restart).
  # Set all four + flip EMAIL_BACKEND=smtp in lims-config to actually send.
  SMTP_HOST: ""
  SMTP_USER: ""
  SMTP_PASSWORD: ""
