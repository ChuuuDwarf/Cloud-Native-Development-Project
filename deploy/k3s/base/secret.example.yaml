# TEMPLATE ONLY — do NOT put real values here and do NOT commit a filled copy.
# The real Secret is generated out-of-band (see deploy/k3s/scripts/gen-secret.sh
# or the CD pipeline) and applied with `kubectl apply`. It is intentionally
# NOT listed in kustomization.yaml so secrets never flow through git.
#
#   kubectl -n lims create secret generic lims-secrets \
#     --from-literal=JWT_SECRET="$(openssl rand -hex 32)" \
#     --from-literal=POSTGRES_PASSWORD="$(openssl rand -hex 16)" \
#     --from-literal=DATABASE_URL="postgresql+asyncpg://lims:<PW>@postgres:5432/lims"
apiVersion: v1
kind: Secret
metadata:
  name: lims-secrets
  namespace: lims
type: Opaque
stringData:
  JWT_SECRET: "REPLACE_ME_32_BYTE_HEX"
  POSTGRES_PASSWORD: "REPLACE_ME"
  # Must embed the same password as POSTGRES_PASSWORD above.
  DATABASE_URL: "postgresql+asyncpg://lims:REPLACE_ME@postgres:5432/lims"
