apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      imagePullSecrets:
        - name: artifact-registry
      containers:
        - name: celery-beat
          image: lims-backend
          command: ["celery", "-A", "app.core.celery_app", "beat", "--loglevel=info"]
          envFrom:
            - configMapRef:
                name: lims-config
          env:
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: JWT_SECRET
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: lims-secrets
                  key: DATABASE_URL
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 256Mi
